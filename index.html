<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز دورك - كوافير الفنان</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
           background-image: url('pic2.jpeg');
background-repeat: repeat;
background-size: 50px;
background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #personal-logo {
            align-self: flex-start;
            width: 80px; 
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        #shop-logo {
            width: 90%; 
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }

        .ticket-container {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border-top: 10px solid #ffcc00;
            width: 280px;
            color: #333;
        } 
        h2 { margin: 0; font-size: 18px; color: #555; }

        #booking-number {
            display: block;
            font-size: 110px;
            font-weight: 900;
            color: #1e3c72;
            margin: 10px 0;
            line-height: 1;
        }

        .date-info {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px dashed #ccc;
        }
        .date-info p { margin: 2px 0; font-size: 14px; font-weight: bold; color: #666; }

        .instruction-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
        }

        .arrow { font-size: 24px; color: #ffcc00; font-weight: bold; }

        #screenshot-btn {
            background: #ffcc00;
            color: #000;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <img src="logo.jpeg" alt="Personal Logo" id="personal-logo">
    <img src="abram.jpeg" alt="Shop Logo" id="shop-logo">

    <div class="ticket-container" id="ticket">
        <h2>رقم الحجز الخاص بك</h2>
        <span id="booking-number">..</span>
        
        <div class="date-info">
            <p id="current-day"></p>
            <p id="current-date"></p>
            <p id="current-time"></p>
        </div>

        <div class="instruction-box">
            <span class="arrow">←</span>
            <button id="screenshot-btn">
                📸 احجز وخذ لقطة شاشة
            </button>
            <span class="arrow">→</span>
        </div>
    </div>
    
<script type="module">
  // استدعاء المكتبات اللازمة
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // بيانات مشروعك (بناءً على الصور اللي بعتها)
  const firebaseConfig = {
    apiKey: "AIzaSyA8rdH_KmstE4FgSCJRp48Db9qFOi50J4c",
    authDomain: "barbar-artist.firebaseapp.com",
    databaseURL: "https://barbar-artist-default-rtdb.firebaseio.com",
    projectId: "barbar-artist",
    storageBucket: "barbar-artist.firebasestorage.app",
    messagingSenderId: "85268082692",
    appId: "1:85268082692:web:a3434f4676da3461fd8551"
  };

  // تشغيل فايربيز
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const counterRef = ref(db, 'bookingCounter');

  // 1. تحديث الوقت والتاريخ تلقائياً في الصفحة
  function updateDateTime() {
    const now = new Date();
    const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
    if(document.getElementById('current-day')) document.getElementById('current-day').innerText = days[now.getDay()];
    if(document.getElementById('current-date')) document.getElementById('current-date').innerText = now.toLocaleDateString('ar-EG');
    if(document.getElementById('current-time')) document.getElementById('current-time').innerText = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
  }
  updateDateTime();

  // 2. فحص هل الجهاز ده حجز قبل كدة أول ما يفتح الصفحة
  window.addEventListener('load', () => {
    const hasBooked = localStorage.getItem('hasBooked');
    if (hasBooked) {
      const btn = document.getElementById('screenshot-btn');
      if (btn) {
        btn.disabled = true; 
        btn.innerText = "تم الحجز مسبقاً ✅";
        btn.style.background = "#ccc";
        btn.style.cursor = "not-allowed";
      }
      const numElement = document.getElementById('booking-number');
      if (numElement) numElement.innerText = hasBooked;
    }
  });

  // 3. عرض الرقم من الداتا بيز (للمستخدمين الجدد فقط)
  onValue(counterRef, (snapshot) => {
    if (!localStorage.getItem('hasBooked')) {
      const data = snapshot.val() || 0;
      const numElement = document.getElementById('booking-number');
      if (numElement) numElement.innerText = data;
    }
  });

  // 4. وظيفة الزرار: حجز لمرة واحدة فقط
  const btn = document.getElementById('screenshot-btn');
  if (btn) {
    btn.addEventListener('click', () => {
      if (localStorage.getItem('hasBooked')) {
        alert("عذراً، لقد حصلت على رقم حجز بالفعل!");
        return;
      }

      runTransaction(counterRef, (currentValue) => {
        return (currentValue || 0) + 1;
      }).then((result) => {
        const newNumber = result.snapshot.val();
        localStorage.setItem('hasBooked', newNumber); // حفظ الرقم في الجهاز
        
        btn.disabled = true;
        btn.innerText = "جاري الحفظ...";

        setTimeout(() => {
          html2canvas(document.getElementById('ticket')).then(canvas => {
            const link = document.createElement('a');
            link.download = 'ticket-barber-' + newNumber + '.png';
            link.href = canvas.toDataURL();
            link.click();
            btn.innerText = "تم الحجز مسبقاً ✅";
            btn.style.background = "#ccc";
          });
        }, 500);
      });
    });
  }
</script>
</body>
</html>
